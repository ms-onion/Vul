name: Tailscale SSH Runner with Hostname Nicky

on:
  workflow_dispatch:

jobs:
  tailscale-ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 jam
    steps:
      - name: Update and install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sudo curl gnupg lsb-release openssh-server unzip

      - name: Set hostname to nicky
        run: |
          sudo hostnamectl set-hostname nicky
          echo "127.0.1.1 nicky" | sudo tee -a /etc/hosts

      - name: Create user nicky with sudo
        run: |
          sudo useradd -m -s /bin/bash nicky
          echo "nicky:nicky" | sudo chpasswd
          sudo usermod -aG sudo nicky
          echo "nicky ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/nicky
          sudo chmod 440 /etc/sudoers.d/nicky

      - name: Enable SSH service
        run: |
          sudo systemctl enable ssh
          sudo systemctl start ssh

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          sudo tailscale up --authkey=${TAILSCALE_AUTHKEY} --hostname=nicky

      - name: Show Tailscale status and IP
        run: |
          tailscale status
          tailscale ip -4

      - name: Keep runner alive for 6 hours
        run: |
          echo "Runner active, Tailscale node hostname 'nicky', press Ctrl+C to stop..."
          sleep 21600
